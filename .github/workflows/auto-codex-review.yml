name: Auto Codex Review

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: auto-codex-review-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: false

jobs:
  request-codex-review:
    name: Request Codex review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Ask Codex to review this PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_ACTION: ${{ github.event.action }}
        run: |
          short_sha="${PR_HEAD_SHA:0:12}"
          marker="Automated request for commit ${short_sha}"

          if gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate --jq '.[].body' | grep -Fq "$marker"; then
            echo "Codex review was already requested for ${short_sha}."
            exit 0
          fi

          body="$(printf '@codex review\n\n%s after %s.' "$marker" "${PR_ACTION}")"

          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --field body="$body"
